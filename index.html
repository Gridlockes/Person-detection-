<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Red Light — Person Detection</title>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.15.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3/dist/pose-detection.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Michroma&family=Saira:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --bg-core:#26262a;
    --bg-edge:#0c0c0e;
    --panel:#161618;
    --panel-2:#202024;
    --line:#3a3a40;
    --line-soft:#26262a;
    --accent:#d2d4d9;
    --accent-strong:#9b9ea5;
    --text:#e7e7ea;
    --text-dim:#8e8e96;
    --text-faint:#5a5a62;
    --alarm:#ff5560;
    --safe:#37e0a4;
    --warn:#ffc14d;

    --head:'Michroma', sans-serif;
    --sans:'Saira', system-ui, sans-serif;
    --mono:'JetBrains Mono', ui-monospace, monospace;

    --clip:polygon(0 15px, 15px 0, 100% 0, 100% 100%, 0 100%);
    --clip-sm:polygon(0 8px, 8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%);
    --clip-cam:polygon(0 22px, 22px 0, 100% 0, 100% calc(100% - 22px), calc(100% - 22px) 100%, 0 100%);
    --clip-chip:polygon(0 6px, 6px 0, 100% 0, 100% 100%, 0 100%);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: radial-gradient(120% 90% at 50% 18%, var(--bg-core), var(--bg-edge) 68%);
    background-attachment: fixed;
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px 20px 40px;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Header ──────────────────────────────────────────── */
  header {
    width: 100%; max-width: 980px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 20px; flex-wrap: wrap; margin-bottom: 24px;
  }

  .brand { display: flex; align-items: center; gap: 13px; }
  .brand-mark {
    width: 12px; height: 12px; flex-shrink: 0;
    background: var(--accent);
    clip-path: polygon(50% 0, 100% 50%, 50% 100%, 0 50%);
    animation: beacon 2s ease-in-out infinite;
  }
  @keyframes beacon { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .logo {
    font-family: var(--head); font-weight: 400;
    font-size: 1.2rem; letter-spacing: 0; line-height: 1.1;
  }
  .logo span {
    display: block; font-family: var(--mono); font-weight: 400;
    font-size: 0.6rem; letter-spacing: 0.18em; color: var(--text-faint);
    text-transform: uppercase; margin-top: 6px;
  }

  .status-bar { display: flex; gap: 8px; flex-wrap: wrap; }
  .chip {
    position: relative; background: var(--line);
    clip-path: var(--clip-chip); padding: 7px 13px;
  }
  .chip::before { content:''; position:absolute; inset:1px; background:var(--panel-2); clip-path:var(--clip-chip); }
  .chip > * { position: relative; }
  .chip-inner {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: var(--mono); font-size: 0.64rem; letter-spacing: 0.04em;
    color: var(--text-dim);
  }
  .status-dot { width: 7px; height: 7px; flex-shrink: 0; background: var(--text-faint); clip-path: polygon(50% 0,100% 50%,50% 100%,0 50%); transition: background 0.3s; }
  .status-dot.active { background: var(--safe); }
  .status-dot.alert { background: var(--alarm); animation: beacon 0.6s infinite; }

  /* ── Layout ──────────────────────────────────────────── */
  main { width: 100%; max-width: 980px; display: grid; grid-template-columns: 1fr 300px; gap: 20px; align-items: start; }

  /* ── Camera ──────────────────────────────────────────── */
  .camera-wrap {
    position: relative; padding: 1.5px;
    background: var(--line); clip-path: var(--clip-cam);
    transition: background 0.3s;
  }
  .camera-wrap.detected { background: var(--alarm); }
  .cam-screen {
    position: relative; width: 100%; aspect-ratio: 4/3;
    background: #000; clip-path: var(--clip-cam); overflow: hidden;
  }

  video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
  canvas { position: absolute; inset: 0; width: 100%; height: 100%; }

  .corner { position: absolute; width: 26px; height: 26px; border-color: var(--accent); border-style: solid; opacity: 0.85; z-index: 10; transition: border-color 0.3s; }
  .corner.tl { top:16px; left:16px; border-width: 2px 0 0 2px; }
  .corner.tr { top:16px; right:16px; border-width: 2px 2px 0 0; }
  .corner.bl { bottom:16px; left:16px; border-width: 0 0 2px 2px; }
  .corner.br { bottom:16px; right:16px; border-width: 0 2px 2px 0; }
  .camera-wrap.detected .corner { border-color: var(--alarm); }

  .detection-flash { position: absolute; inset: 0; background: radial-gradient(circle at center, transparent 42%, rgba(255,85,96,0.16)); opacity: 0; pointer-events: none; z-index: 5; transition: opacity 0.1s; }
  .detection-flash.show { opacity: 1; }

  .loading-overlay { position: absolute; inset: 0; background: rgba(3,22,28,0.86); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 20; gap: 16px; }
  .spinner { width: 38px; height: 38px; border: 2.5px solid var(--line-soft); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.9s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .load-text { font-family: var(--mono); font-size: 0.66rem; letter-spacing: 0.12em; color: var(--text-dim); }

  /* ── Panels ──────────────────────────────────────────── */
  .sidebar { display: flex; flex-direction: column; gap: 16px; }
  .panel { position: relative; background: var(--line); clip-path: var(--clip); padding: 18px; }
  .panel::before { content:''; position:absolute; inset:1px; background:var(--panel); clip-path:var(--clip); z-index:0; }
  .panel > * { position: relative; z-index: 1; }

  .panel-title {
    display: flex; align-items: center; gap: 8px;
    font-family: var(--mono); font-size: 0.6rem; font-weight: 500;
    letter-spacing: 0.2em; color: var(--text-dim); text-transform: uppercase;
    margin-bottom: 15px;
  }
  .panel-title::before { content:''; width:0; height:0; border-left:6px solid var(--accent); border-top:4px solid transparent; border-bottom:4px solid transparent; }

  /* ── Threat ──────────────────────────────────────────── */
  .threat-level { font-family: var(--head); font-weight: 400; font-size: 1.3rem; letter-spacing: 0; text-align: center; padding: 6px 0 3px; transition: color 0.3s; }
  .threat-level.clear   { color: var(--safe); }
  .threat-level.alert   { color: var(--alarm); }
  .threat-level.loading { color: var(--warn); }
  .sub-status { text-align: center; font-size: 0.74rem; color: var(--text-dim); margin-top: 3px; }

  .conf-bar-wrap { margin-top: 16px; }
  .conf-label { display: flex; justify-content: space-between; font-family: var(--mono); font-size: 0.62rem; color: var(--text-dim); margin-bottom: 7px; letter-spacing: 0.05em; }
  .conf-bar { height: 6px; background: var(--line-soft); clip-path: polygon(0 0,100% 0,100% 100%,2px 100%,0 calc(100% - 2px)); overflow: hidden; }
  .conf-fill { height: 100%; background: linear-gradient(90deg, var(--accent-strong), var(--accent)); transition: width 0.3s; }

  /* ── Stats ───────────────────────────────────────────── */
  .stat-row { display: flex; justify-content: space-between; align-items: center; padding: 9px 0; font-size: 0.76rem; border-bottom: 1px solid var(--line-soft); }
  .stat-row:first-of-type { padding-top: 0; }
  .stat-row:last-child { border-bottom: none; padding-bottom: 0; }
  .stat-label { color: var(--text-dim); }
  .stat-value { color: var(--text); font-weight: 500; font-family: var(--mono); }
  .stat-value.danger { color: var(--alarm); }
  .stat-value.safe { color: var(--safe); }

  /* ── Controls ────────────────────────────────────────── */
  .field-label { display: flex; align-items: center; gap: 9px; font-family: var(--mono); font-size: 0.62rem; letter-spacing: 0.08em; color: var(--text-dim); text-transform: uppercase; margin-bottom: 10px; }
  .field-label .icon { width: 15px; height: 15px; color: var(--accent); }

  .btn {
    position: relative; width: 100%;
    display: flex; align-items: center; gap: 11px;
    padding: 11px 14px; background: var(--line); clip-path: var(--clip-sm);
    color: var(--text-dim); font-family: var(--sans); font-size: 0.8rem; font-weight: 500;
    cursor: pointer; text-align: left; transition: color 0.15s; margin-bottom: 9px;
  }
  .btn::before { content:''; position:absolute; inset:1px; background:var(--panel-2); clip-path:var(--clip-sm); transition: background 0.15s; z-index:0; }
  .btn > * { position: relative; z-index: 1; }
  .btn:hover { color: var(--text); }
  .btn:hover::before { background: #0d3e4d; }
  .btn:last-child { margin-bottom: 0; }
  .btn.active { color: #052028; background: var(--accent-strong); }
  .btn.active::before { background: var(--accent); }

  .icon { width: 17px; height: 17px; flex-shrink: 0; display: block; }
  .btn .vol-slash { display: none; }
  .btn.muted .vol-waves { display: none; }
  .btn.muted .vol-slash { display: block; }

  select.ctrl-select, select.mini-select {
    background: var(--panel-2); border: 1px solid var(--line); color: var(--text);
    font-family: var(--sans); cursor: pointer; outline: none; transition: border-color 0.15s;
  }
  select.ctrl-select { width: 100%; font-size: 0.78rem; padding: 10px 11px; margin-bottom: 16px; }
  select.mini-select { font-size: 0.64rem; padding: 3px 7px; }
  select.ctrl-select:focus, select.mini-select:focus { border-color: var(--accent); }

  .cooldown-wrap { margin-top: 14px; }
  .cooldown-bar { height: 6px; background: var(--line-soft); clip-path: polygon(0 0,100% 0,100% 100%,2px 100%,0 calc(100% - 2px)); overflow: hidden; }
  .cooldown-fill { height: 100%; background: linear-gradient(90deg, var(--warn), #ff9a4d); width: 0%; transition: width 0.1s linear; }

  /* ── Log ─────────────────────────────────────────────── */
  .log {
    max-height: 170px; overflow-y: auto;
    font-family: var(--mono); font-size: 0.64rem; color: var(--text-faint);
    line-height: 1.85; padding-right: 8px;
    scrollbar-width: thin; scrollbar-color: var(--line) transparent;
  }
  .log::-webkit-scrollbar { width: 6px; }
  .log::-webkit-scrollbar-track { background: transparent; }
  .log::-webkit-scrollbar-thumb { background: var(--line); }
  .log::-webkit-scrollbar-thumb:hover { background: var(--accent-strong); }
  .log-entry { padding: 1px 0; }
  .log-entry.alert { color: var(--alarm); }
  .log-entry.clear { color: var(--safe); }
  .log-entry.info { color: var(--warn); }

  footer { margin-top: 26px; font-family: var(--mono); font-size: 0.6rem; color: var(--text-faint); letter-spacing: 0.08em; text-align: center; }

  @media (max-width: 760px) { main { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-mark"></div>
    <div class="logo">
      Red Light
      <span></span>
    </div>
  </div>
  <div class="status-bar">
    <div class="chip"><span class="chip-inner"><span class="status-dot" id="modelDot"></span><span id="modelStatus">Offline</span></span></div>
    <div class="chip"><span class="chip-inner"><span class="status-dot" id="poseDot"></span><span id="poseStatus">Pose Off</span></span></div>
    <div class="chip"><span class="chip-inner"><span class="status-dot" id="camDot"></span><span id="camStatus">No Feed</span></span></div>
  </div>
</header>

<main>
  <div class="camera-wrap" id="cameraWrap">
    <div class="cam-screen">
      <video id="video" autoplay muted playsinline></video>
      <canvas id="canvas"></canvas>
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>
      <div class="detection-flash" id="flash"></div>
      <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <div class="load-text" id="loadText">Initializing…</div>
      </div>
    </div>
  </div>

  <div class="sidebar">

    <div class="panel">
      <div class="panel-title">Threat Status</div>
      <div class="threat-level loading" id="threatLevel">Loading</div>
      <div class="sub-status" id="subStatus">Initializing models…</div>
      <div class="conf-bar-wrap">
        <div class="conf-label"><span>CONFIDENCE</span><span id="confPct">0%</span></div>
        <div class="conf-bar"><div class="conf-fill" id="confFill" style="width:0%"></div></div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">Statistics</div>
      <div class="stat-row"><span class="stat-label">Detections</span><span class="stat-value" id="statDetections">0</span></div>
      <div class="stat-row"><span class="stat-label">Persons in frame</span><span class="stat-value" id="statPersons">0</span></div>
      <div class="stat-row"><span class="stat-label">Joints tracked</span><span class="stat-value" id="statJoints">0</span></div>
      <div class="stat-row"><span class="stat-label">Alerts fired</span><span class="stat-value danger" id="statAlerts">0</span></div>
      <div class="stat-row"><span class="stat-label">Uptime</span><span class="stat-value safe" id="statUptime">00:00</span></div>
      <div class="stat-row"><span class="stat-label">FPS</span><span class="stat-value" id="statFps">--</span></div>
    </div>

    <div class="panel">
      <div class="panel-title">Controls</div>
      <div class="field-label">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 8.5A2 2 0 0 1 5 6.5h1.6l1.2-1.8a1 1 0 0 1 .83-.45h6.74a1 1 0 0 1 .83.45L17.4 6.5H19a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <circle cx="12" cy="12.5" r="3.3"/>
        </svg>
        <span>Camera source</span>
      </div>
      <select id="cameraSelect" class="ctrl-select" onchange="switchCamera()">
        <option value="">Select camera…</option>
      </select>
      <button class="btn active" id="btnVoice" onclick="toggleVoice()">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 9.5v5h3l4.5 3.5V6L7 9.5H4z"/>
          <g class="vol-waves">
            <path d="M15.5 9.5a3.5 3.5 0 0 1 0 5"/>
            <path d="M18 7a7 7 0 0 1 0 10"/>
          </g>
          <g class="vol-slash">
            <line x1="16" y1="9.5" x2="20.5" y2="14.5"/>
            <line x1="20.5" y1="9.5" x2="16" y2="14.5"/>
          </g>
        </svg>
        <span class="btn-label">Voice alert · On</span>
      </button>
      <button class="btn active" id="btnSkeleton" onclick="toggleSkeleton()">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="4.6" r="2.4"/>
          <path d="M12 7.2v7"/>
          <path d="M6.5 10.5h11"/>
          <path d="M12 14.2 8.2 20.5"/>
          <path d="M12 14.2 15.8 20.5"/>
        </svg>
        <span class="btn-label">Skeleton · On</span>
      </button>
      <button class="btn active" id="btnBoxes" onclick="toggleBoxes()">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 8.5V6a1.5 1.5 0 0 1 1.5-1.5H8"/>
          <path d="M16 4.5h2.5A1.5 1.5 0 0 1 20 6v2.5"/>
          <path d="M20 15.5V18a1.5 1.5 0 0 1-1.5 1.5H16"/>
          <path d="M8 19.5H5.5A1.5 1.5 0 0 1 4 18v-2.5"/>
        </svg>
        <span class="btn-label">Show boxes · On</span>
      </button>
      <button class="btn active" id="btnMirror" onclick="toggleMirror()">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="3" x2="12" y2="21" stroke-dasharray="2.5 2.5"/>
          <path d="M7.5 8 4 12l3.5 4"/>
          <path d="M16.5 8 20 12l-3.5 4"/>
        </svg>
        <span class="btn-label">Mirror · On</span>
      </button>
      <div class="cooldown-wrap">
        <div class="conf-label">
          <span>ALERT COOLDOWN</span>
          <select id="cooldownSelect" class="mini-select">
            <option value="3000">3s</option>
            <option value="5000" selected>5s</option>
            <option value="10000">10s</option>
            <option value="30000">30s</option>
          </select>
        </div>
        <div class="cooldown-bar"><div class="cooldown-fill" id="cooldownFill"></div></div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">Event Log</div>
      <div class="log" id="log">
        <div class="log-entry info">[BOOT] System starting…</div>
      </div>
    </div>

  </div>
</main>

<footer></footer>

<script>
  const $ = id => document.getElementById(id);
  const el = {
    video:$('video'), canvas:$('canvas'), wrap:$('cameraWrap'), flash:$('flash'),
    loading:$('loadingOverlay'), loadText:$('loadText'),
    threat:$('threatLevel'), sub:$('subStatus'), confPct:$('confPct'), confFill:$('confFill'),
    statDetections:$('statDetections'), statPersons:$('statPersons'), statJoints:$('statJoints'),
    statAlerts:$('statAlerts'), statUptime:$('statUptime'), statFps:$('statFps'),
    cameraSelect:$('cameraSelect'), cooldown:$('cooldownSelect'), cooldownFill:$('cooldownFill'),
    log:$('log'),
  };
  const ctx = el.canvas.getContext('2d');

  let detector = null, poser = null, stream = null, running = false;
  let voiceOn = true, boxesOn = true, skeletonOn = true, mirrorOn = true;
  let lastAlert = 0, detectionCount = 0, alertCount = 0, startTime = Date.now();
  let frames = 0, lastFpsAt = Date.now();

  const mirrorX = x => mirrorOn ? el.canvas.width - x : x;

  // MoveNet keypoints (17) + skeleton wiring
  const KP = { NOSE:0, L_EYE:1, R_EYE:2, L_EAR:3, R_EAR:4, L_SHO:5, R_SHO:6,
    L_ELB:7, R_ELB:8, L_WRI:9, R_WRI:10, L_HIP:11, R_HIP:12, L_KNE:13, R_KNE:14, L_ANK:15, R_ANK:16 };
  const SKELETON = [
    [KP.L_EAR,KP.L_EYE,'#00e5ff'], [KP.R_EAR,KP.R_EYE,'#00e5ff'],
    [KP.L_EYE,KP.NOSE,'#00e5ff'], [KP.R_EYE,KP.NOSE,'#00e5ff'],
    [KP.L_SHO,KP.R_SHO,'#37e0a4'],
    [KP.L_SHO,KP.L_ELB,'#ffc14d'], [KP.L_ELB,KP.L_WRI,'#ffc14d'],
    [KP.R_SHO,KP.R_ELB,'#ff6b35'], [KP.R_ELB,KP.R_WRI,'#ff6b35'],
    [KP.L_SHO,KP.L_HIP,'#37e0a4'], [KP.R_SHO,KP.R_HIP,'#37e0a4'], [KP.L_HIP,KP.R_HIP,'#37e0a4'],
    [KP.L_HIP,KP.L_KNE,'#c084fc'], [KP.L_KNE,KP.L_ANK,'#c084fc'],
    [KP.R_HIP,KP.R_KNE,'#fb7185'], [KP.R_KNE,KP.R_ANK,'#fb7185'],
  ];
  const JOINT_COLORS = ['#00e5ff','#00e5ff','#00e5ff','#00e5ff','#00e5ff','#37e0a4','#37e0a4',
    '#ffc14d','#ff6b35','#ffc14d','#ff6b35','#37e0a4','#37e0a4','#c084fc','#fb7185','#c084fc','#fb7185'];

  // ── Small helpers ──────────────────────────────────────
  function log(msg, type = '') {
    const ts = new Date().toLocaleTimeString('en-US', { hour12: false });
    const div = document.createElement('div');
    div.className = 'log-entry ' + type;
    div.textContent = `[${ts}] ${msg}`;
    el.log.appendChild(div);
    el.log.scrollTop = el.log.scrollHeight;
    while (el.log.children.length > 50) el.log.removeChild(el.log.firstChild);
  }

  function setChip(dotId, labelId, text, state) {
    $(dotId).className = 'status-dot ' + (state === 'on' ? 'active' : state === 'alert' ? 'alert' : '');
    $(labelId).textContent = text;
  }

  function setThreat(state, big, sub) {
    el.threat.textContent = big;
    el.threat.className = 'threat-level ' + state;
    el.sub.textContent = sub;
  }

  function speak(text) {
    const u = new SpeechSynthesisUtterance(text);
    u.rate = 0.9; u.pitch = 0.8;
    const v = speechSynthesis.getVoices().find(v => /google|microsoft/i.test(v.name) && /en/i.test(v.lang));
    if (v) u.voice = v;
    speechSynthesis.speak(u);
  }

  function animateCooldown(ms) {
    const f = el.cooldownFill;
    f.style.transition = 'none';
    f.style.width = '100%';
    setTimeout(() => { f.style.transition = `width ${ms}ms linear`; f.style.width = '0%'; }, 50);
  }

  setInterval(() => {
    if (!running) return;
    const s = Math.floor((Date.now() - startTime) / 1000);
    el.statUptime.textContent = `${String(Math.floor(s / 60)).padStart(2,'0')}:${String(s % 60).padStart(2,'0')}`;
  }, 1000);

  // ── Drawing ────────────────────────────────────────────
  function drawPose(keypoints) {
    const CONF = 0.3;
    for (const [a, b, color] of SKELETON) {
      const A = keypoints[a], B = keypoints[b];
      if (!A || !B || A.score < CONF || B.score < CONF) continue;
      ctx.beginPath();
      ctx.moveTo(mirrorX(A.x), A.y);
      ctx.lineTo(mirrorX(B.x), B.y);
      ctx.strokeStyle = color;
      ctx.lineWidth = 2.5;
      ctx.shadowColor = color; ctx.shadowBlur = 6;
      ctx.globalAlpha = Math.min(A.score, B.score) * 1.5;
      ctx.stroke();
    }
    ctx.globalAlpha = 1; ctx.shadowBlur = 0;

    let count = 0;
    keypoints.forEach((kp, i) => {
      if (!kp || kp.score < CONF) return;
      count++;
      const x = mirrorX(kp.x), color = JOINT_COLORS[i];
      ctx.beginPath(); ctx.arc(x, kp.y, 5, 0, 7);
      ctx.fillStyle = color; ctx.shadowColor = color; ctx.shadowBlur = 10; ctx.fill();
      ctx.beginPath(); ctx.arc(x, kp.y, 2.5, 0, 7);
      ctx.fillStyle = '#fff'; ctx.shadowBlur = 0; ctx.fill();
    });
    return count;
  }

  function drawBox(p) {
    const [x, y, w, h] = p.bbox;
    const sx = mirrorOn ? el.canvas.width - x - w : x;
    ctx.strokeStyle = '#ff5560';
    ctx.lineWidth = 2;
    ctx.strokeRect(sx, y, w, h);
    const cs = 14;
    ctx.lineWidth = 3;
    [[sx,y],[sx+w-cs,y],[sx,y+h-cs],[sx+w-cs,y+h-cs]].forEach(([cx,cy], i) => {
      ctx.beginPath();
      ctx.moveTo(cx + (i % 2 === 0 ? cs : -cs), cy);
      ctx.lineTo(cx, cy);
      ctx.lineTo(cx, cy + (i < 2 ? cs : -cs));
      ctx.stroke();
    });
    const label = `PERSON ${Math.round(p.score * 100)}%`;
    ctx.font = '500 12px "JetBrains Mono", monospace';
    ctx.fillStyle = 'rgba(255,85,96,0.9)';
    ctx.fillRect(sx, y - 22, ctx.measureText(label).width + 14, 22);
    ctx.fillStyle = '#fff';
    ctx.fillText(label, sx + 7, y - 6);
  }

  // ── Detection loop ─────────────────────────────────────
  async function detect() {
    if (!running || !detector) return;

    const preds = await detector.detect(el.video);

    frames++;
    if (Date.now() - lastFpsAt >= 1000) { el.statFps.textContent = frames; frames = 0; lastFpsAt = Date.now(); }

    ctx.clearRect(0, 0, el.canvas.width, el.canvas.height);
    const persons = preds.filter(p => p.class === 'person' && p.score > 0.45);
    el.statPersons.textContent = persons.length;

    let joints = 0;
    if (poser && skeletonOn && persons.length) {
      try {
        for (const pose of await poser.estimatePoses(el.video))
          if (pose.score > 0.2) joints += drawPose(pose.keypoints);
      } catch {}
    }
    el.statJoints.textContent = joints;

    if (persons.length) {
      el.statDetections.textContent = ++detectionCount;
      const conf = Math.round(persons.reduce((a, b) => a.score > b.score ? a : b).score * 100);
      el.confFill.style.width = conf + '%';
      el.confPct.textContent = conf + '%';

      if (boxesOn) persons.forEach(drawBox);

      setThreat('alert', 'Detected', `${persons.length} person${persons.length > 1 ? 's' : ''} in frame`);
      el.wrap.classList.add('detected');
      el.flash.classList.add('show');
      setTimeout(() => el.flash.classList.remove('show'), 100);

      const cooldown = +el.cooldown.value;
      if (voiceOn && Date.now() - lastAlert > cooldown) {
        lastAlert = Date.now();
        el.statAlerts.textContent = ++alertCount;
        speak(persons.length > 1 ? `${persons.length} persons detected` : 'Person detected');
        log(`ALERT · ${persons.length} person${persons.length > 1 ? 's' : ''} detected (${conf}% conf)`, 'alert');
        animateCooldown(cooldown);
      }
    } else {
      setThreat('clear', 'Clear', 'No persons detected');
      el.wrap.classList.remove('detected');
      el.confFill.style.width = '0%';
      el.confPct.textContent = '0%';
    }

    requestAnimationFrame(detect);
  }

  // ── Camera ─────────────────────────────────────────────
  async function listCameras() {
    try { (await navigator.mediaDevices.getUserMedia({ video: true })).getTracks().forEach(t => t.stop()); } catch {}
    const cams = (await navigator.mediaDevices.enumerateDevices()).filter(d => d.kind === 'videoinput');
    el.cameraSelect.innerHTML = '';
    cams.forEach((c, i) => {
      const o = document.createElement('option');
      o.value = c.deviceId; o.textContent = c.label || `Camera ${i + 1}`;
      el.cameraSelect.appendChild(o);
    });
    log(`Found ${cams.length} camera(s)`, 'info');
    return cams[0]?.deviceId || null;
  }

  async function startCamera(deviceId) {
    if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
    running = false;

    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { deviceId: deviceId ? { exact: deviceId } : undefined, width: { ideal: 640 }, height: { ideal: 480 } }
      });
      el.video.srcObject = stream;
      setChip('camDot', 'camStatus', 'Live', 'on');
      log(`Camera: ${el.cameraSelect.selectedOptions[0]?.text || 'Camera'}`, 'clear');
    } catch (e) {
      log('Camera error: ' + e.message, 'alert');
      setChip('camDot', 'camStatus', 'Cam Error', 'alert');
      el.loading.style.display = 'flex';
      el.loadText.textContent = 'Camera error';
      return;
    }

    await new Promise(res => {
      el.video.onloadeddata = () => {
        el.canvas.width = el.video.videoWidth;
        el.canvas.height = el.video.videoHeight;
        el.loading.style.display = 'none';
        setThreat('clear', 'Clear', 'Monitoring…');
        running = true; startTime = Date.now();
        res();
      };
    });
  }

  async function switchCamera() {
    if (!el.cameraSelect.value || !detector) return;
    el.loading.style.display = 'flex';
    el.loadText.textContent = 'Switching camera…';
    await startCamera(el.cameraSelect.value);
    detect();
  }

  // ── Controls ───────────────────────────────────────────
  function toggleVoice() {
    voiceOn = !voiceOn;
    const b = $('btnVoice');
    b.querySelector('.btn-label').textContent = `Voice alert · ${voiceOn ? 'On' : 'Off'}`;
    b.classList.toggle('active', voiceOn);
    b.classList.toggle('muted', !voiceOn);
    log(`Voice alerts ${voiceOn ? 'enabled' : 'disabled'}`, 'info');
  }

  function toggleSkeleton() {
    skeletonOn = !skeletonOn;
    const b = $('btnSkeleton');
    b.querySelector('.btn-label').textContent = `Skeleton · ${skeletonOn ? 'On' : 'Off'}`;
    b.classList.toggle('active', skeletonOn);
    log(`Skeleton overlay ${skeletonOn ? 'enabled' : 'disabled'}`, 'info');
  }

  function toggleBoxes() {
    boxesOn = !boxesOn;
    const b = $('btnBoxes');
    b.querySelector('.btn-label').textContent = `Show boxes · ${boxesOn ? 'On' : 'Off'}`;
    b.classList.toggle('active', boxesOn);
  }

  function toggleMirror() {
    mirrorOn = !mirrorOn;
    const b = $('btnMirror');
    b.querySelector('.btn-label').textContent = `Mirror · ${mirrorOn ? 'On' : 'Off'}`;
    b.classList.toggle('active', mirrorOn);
    el.video.style.transform = mirrorOn ? 'scaleX(-1)' : 'none';
  }

  // ── Init ───────────────────────────────────────────────
  async function init() {
    el.loadText.textContent = 'Loading detector…';
    log('Loading COCO-SSD…', 'info');
    try {
      detector = await cocoSsd.load();
      setChip('modelDot', 'modelStatus', 'Detector Ready', 'on');
      log('COCO-SSD ready', 'clear');
    } catch (e) {
      log('COCO-SSD failed: ' + e.message, 'alert');
      setChip('modelDot', 'modelStatus', 'Detector Error', 'alert');
      setThreat('alert', 'Error', 'Model load failed');
      return;
    }

    el.loadText.textContent = 'Loading pose model…';
    log('Loading MoveNet…', 'info');
    try {
      poser = await poseDetection.createDetector(
        poseDetection.SupportedModels.MoveNet,
        { modelType: poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING }
      );
      setChip('poseDot', 'poseStatus', 'Pose Ready', 'on');
      log('MoveNet ready', 'clear');
    } catch (e) {
      log('Pose model failed: ' + e.message, 'info');
      setChip('poseDot', 'poseStatus', 'Pose Off', 'off');
      skeletonOn = false;
      $('btnSkeleton').querySelector('.btn-label').textContent = 'Skeleton · Off';
      $('btnSkeleton').classList.remove('active');
    }

    el.loadText.textContent = 'Scanning cameras…';
    const first = await listCameras();
    el.loadText.textContent = 'Starting camera…';
    await startCamera(first);
    detect();

    navigator.mediaDevices.addEventListener('devicechange', async () => {
      log('Device change — refreshing cameras', 'info');
      const cur = el.cameraSelect.value;
      await listCameras();
      if ([...el.cameraSelect.options].some(o => o.value === cur)) el.cameraSelect.value = cur;
    });
  }

  speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
  init();
</script>
</body>
